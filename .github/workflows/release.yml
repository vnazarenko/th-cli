name: release

# On a `vX.Y.Z` tag: cross-compile the matrix (VERSION stamped from the tag),
# checksum it, and publish the binaries + SHA256SUMS as a public GitHub Release.
# The skill launcher (skills/th-cli/bin/th-cli) downloads them from
# https://github.com/vnazarenko/th-cli/releases/download/<tag>/... — no token.
#
# Keep the pinned skills/th-cli/VERSION equal to the tag you push.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: cross-compile
        run: make release VERSION="${GITHUB_REF_NAME}" COMMIT="${GITHUB_SHA::7}"
      - name: checksums
        run: cd dist && sha256sum th-* > SHA256SUMS
      - name: publish github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/th-* dist/SHA256SUMS \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release ${GITHUB_REF_NAME}. Binaries for macOS and Linux (amd64/arm64); verify with SHA256SUMS."
